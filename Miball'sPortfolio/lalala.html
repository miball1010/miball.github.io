<!DOCTYPE html>
<html>
<head>
    <title>点击图像放大</title>
    <style>
        .image-container {
            position: relative;
            width: 300px;
            height: 200px;
            overflow: hidden;
            transition: width 0.3s, height 0.3s;
        }
        
        .image-container img {
            width: 100%;
            height: 100%;
            transition: transform 0.3s;
        }
        
        .image-container.zoomed {
            width: 500px;
            height: 350px;
        }
        
        .image-container.zoomed img {
            transform: scale(1.2);
        }
    </style>
</head>
<body>
    <div class="image-container" onclick="toggleZoom(this)">
        <img src="img/123.jpg" alt="Image">
    </div>
    
    <script>
        function toggleZoom(container) {
            container.classList.toggle('zoomed');
        }
    </script>
</body>
</html>
