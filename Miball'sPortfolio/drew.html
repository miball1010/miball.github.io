<style>
    .container {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
    }

    .image-container {
        box-shadow: 0 10px 10px 0 rgba(0, 0, 0, 0.285);
        width: 250px;
        height: 250px;
        position: relative;
        margin: 10px;
        transition: width 0.3s, height 0.3s;
    }

    .image-container.zoomed {
        width: 100%;
        height: 100%;
    }

    .image-container img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        filter: grayscale(100%);
        cursor: pointer;
       
    }

    .image-container img:hover {
        filter: grayscale(0%);
    }
    .image-container.zoomed img{
        filter: grayscale(0%);
        
        padding: 0;
        margin: 0;
    }

    @media (max-width:600px) {
        .image-container img {
            filter: grayscale(0%);

        }
    }
</style>
<script>
    function big(container) {
        container.classList.toggle('zoomed');
    }
</script>
