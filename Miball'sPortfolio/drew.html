<style>
    .container {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
    }

    .image-container {
        box-shadow: 0 10px 10px 0 rgba(0, 0, 0, 0.285);
        width: 225px;
        height: 225px;
        position: relative;
        display: flex;
        margin: 10px;
        transition: width 0.3s, height 0.3s;
    }

    .image-container.zoomed {
        width: 100%;
        height: 100%;
        transition: 0.5s ease;
    }

    .image-container img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        filter: grayscale(100%);
        cursor: pointer;
        transition: 0.5s ease;
       
    }

    .image-container img:hover {
        filter: grayscale(0%);
        transition: 0.5s ease;
    }
    .image-container.zoomed img{
        filter: grayscale(0%);
        transition: 0.5s ease;
        padding: 0;
        margin: 0;
    }

    @media (max-width:1180px) {
        .image-container img {
            filter: grayscale(0%);

        }
    }
</style>
<script>
    function big(container) {
        container.classList.toggle('zoomed');
    }
</script>
