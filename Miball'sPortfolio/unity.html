            <h3 class="con_box-title">Unity<br>《蘋果的冒險》<br><br></h3>


            <p>|類型&nbsp單人冒險<br> |平台&nbspWindows電腦</p><br>
            <p>從2021年12月開始決定製作，2022年2月完成，程式、美術、構想皆為獨立完成。<br><br>
                之前期末專題是以跨越障礙物的遊玩方式加上3D建模的作品製作一款遊戲，但是當時學的東西太基本，後來上了手機遊戲程式設計的課，也上網看了很多教學影片，結合玩過第一代的朋友給的回饋，最後做出這個遊戲。
            </p><br>
            <p>
                用鍵盤操作小蘋果移動、跳躍，滑鼠控制選擇。
                蒐集蘋果並越過障礙物就可以過關，總共有三種不同的結局。</p>
